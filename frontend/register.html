<head>

<meta charset="UTF-8">

content="width=device-width, initial-scale=1.0">

<style>

    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f4f8fb;
    color: #222;
}

/* HEADER */

header {
    background-color: #0b3d62;
    color: white;
    text-align: center;
    padding: 35px 20px;
}

header h1 {
    margin-bottom: 8px;
}

/* NAVIGATION */

nav {
    background-color: #062b45;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    font-weight: bold;
}

nav a:hover {
    color: #ffd700;
}

/* CONTAINER */

.container {
    max-width: 550px;
    margin: 50px auto;
    padding: 20px;
}

/* FORM BOX */

.form-box {
    background-color: white;
    padding: 35px;
    border-radius: 10px;
    box-shadow: 0 3px 15px rgba(0,0,0,0.15);
}

.form-box h2 {
    text-align: center;
    color: #0b3d62;
    margin-bottom: 10px;
}

.form-box > p {
    text-align: center;
    margin-bottom: 25px;
}

/* FORM */

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 7px;
}

input,
select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 15px;
}

/* BUTTON */

button {
    width: 100%;
    padding: 12px;
    background-color: #0b3d62;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: #062b45;
}

/* MESSAGE */

#message {
    display: none;
    margin-top: 20px;
    padding: 15px;
    text-align: center;
    background-color: #eaf2f7;
}

/* LOGIN */

.login {
    text-align: center;
    margin-top: 20px;
}

.login a {
    color: #0b3d62;
    font-weight: bold;
    text-decoration: none;
}

/* FOOTER */

footer {
    background-color: #062b45;
    color: white;
    text-align: center;
    padding: 25px;
    margin-top: 50px;
}

</style>

</head>


<body>


<!-- HEADER -->

<header>

<h1>
Source of Information
</h1>

<p>
Student Registration
</p>

</header>


<!-- NAVIGATION -->

<nav>

<a href="index.html">
Home
</a>

<a href="resources.html">
Resources
</a>

<a href="innovation.html">
Innovation
</a>

<a href="login.html">
Login
</a>

</nav>


<!-- REGISTRATION -->

<div class="container">

<div class="form-box">

<h2>
Create Your SOI Account
</h2>

<p>
Join the SOI learning community.
</p>


<form id="registerForm">


<!-- NAME -->

<div class="form-group">

<label for="fullname">
Full Name
</label>

<input
type="text"
id="fullname"
placeholder="Enter your full name"
required>

</div>


<!-- EMAIL -->

<div class="form-group">

<label for="email">
Email Address
</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>


<!-- SCHOOL -->

<div class="form-group">

<label for="school">
School / Institution
</label>

<input
type="text"
id="school"
placeholder="Enter your school"
required>

</div>


<!-- CLASS -->

<div class="form-group">

<label for="level">
Class / Level
</label>

<select
id="level"
required>

<option value="">
Select your class
</option>

<option>S1</option>

<option>S2</option>

<option>S3</option>

<option>S4</option>

<option>S5</option>

<option>S6</option>

<option>
University / College
</option>

</select>

</div>


<!-- PASSWORD -->

<div class="form-group">

<label for="password">
Create Password
</label>

<input
type="password"
id="password"
placeholder="Create a password"
required>

</div>


<!-- CONFIRM PASSWORD -->

<div class="form-group">

<label for="confirmPassword">
Confirm Password
</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm your password"
required>

</div>


<button type="submit">

Create Account

</button>


</form>


<div id="message">

Registration successful!

</div>


<div class="login">

<p>
Already have an account?
</p>

<a href="login.html">
Login Here
</a>

</div>


</div>

</div>


<!-- FOOTER -->

<footer>

<p>
&copy; 2026 Source of Information.
All Rights Reserved.
</p>

<p>
Education • Science • Technology • Innovation
</p>

</footer>


<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../supabase-config.js"></script>


<script>

const supabaseClient =
    supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
    );


document
.getElementById("registerForm")
.addEventListener("submit", async function(event) {

    event.preventDefault();


    const fullName =
        document
        .getElementById("fullname")
        .value
        .trim();


    const email =
        document
        .getElementById("email")
        .value
        .trim();


    const school =
        document
        .getElementById("school")
        .value
        .trim();


    const classLevel =
        document
        .getElementById("level")
        .value;


    const password =
        document
        .getElementById("password")
        .value;


    const confirmPassword =
        document
        .getElementById("confirmPassword")
        .value;


    /* CHECK PASSWORDS */

    if (password !== confirmPassword) {

        alert(
            "Passwords do not match."
        );

        return;

    }


    /* CREATE ACCOUNT */

    const {
        data,
        error
    } = await supabaseClient.auth.signUp({

        email: email,

        password: password

    });


    /* CHECK FOR ERROR */

    if (error) {

        alert(
            "Registration failed: "
            + error.message
        );

        return;

    }


    /* SAVE PROFILE */

    if (data.user) {

        const {
            error: profileError
        } = await supabaseClient
        .from("student_profiles")
        .insert({

            id: data.user.id,

            full_name: fullName,

            email: email,

            school: school,

            class_level: classLevel

        });


        if (profileError) {

            alert(
                "Account created, but profile could not be saved: "
                + profileError.message
            );

            return;

        }

    }


    alert(
        "Registration successful! Please check your email to verify your account."
    );


    document
    .getElementById("registerForm")
    .reset();


    window.location.href =
        "login.html";


});

</script>


</body>

</html>
